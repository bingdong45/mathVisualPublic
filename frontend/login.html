<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — AnimateAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #08080B;
      --surface:    #101014;
      --surface-2:  #17171D;
      --border:     #222228;
      --border-2:   #2E2E36;
      --text:       #EDECE5;
      --text-mid:   #A09FA8;
      --text-muted: #5C5C66;
      --accent:     #C9A84C;
      --accent-dim: #1A1608;
      --radius:     10px;
      --radius-lg:  16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image: radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* ── NAV ─────────────────────────────────────── */
    nav {
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }

    /* ── AUTH LAYOUT ─────────────────────────────── */
    .auth-layout {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.5s ease forwards;
    }

    .auth-header {
      margin-bottom: 36px;
      text-align: center;
    }

    .auth-title {
      font-family: 'Fraunces', serif;
      font-size: 34px;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      color: var(--text);
    }
    .auth-title em {
      font-style: italic;
      color: var(--accent);
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ── FORM ────────────────────────────────────── */
    .auth-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px;
    }

    .form-group {
      margin-bottom: 20px;
    }
    .form-group:last-of-type {
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-mid);
      margin-bottom: 8px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-font-smoothing: antialiased;
    }
    input::placeholder { color: var(--text-muted); }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .form-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .form-checkbox input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .forgot-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    .forgot-link:hover { opacity: 1; }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #0A0800;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 13px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 24px 0;
      font-size: 12px;
      color: var(--text-muted);
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .auth-footer a:hover { opacity: 0.8; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Animate<span>AI</span></a>
  </nav>

  <div class="auth-layout">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">Welcome <em>back</em></h1>
        <p class="auth-subtitle">Log in to your AnimateAI account</p>
      </div>

      <div class="auth-form">
        <form action="#" method="POST" id="login-form">

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            >
          </div>

          <div class="form-row">
            <label class="form-checkbox">
              <input type="checkbox" name="remember"> Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn-submit">Log In</button>
        </form>

        <div class="auth-divider">or</div>

        <div class="auth-footer">
          Don't have an account? <a href="signup.html">Sign up →</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      // TODO: wire to POST /api/auth/login
      window.location.href = 'app.html';
    });
  </script>

</body>
</html>
