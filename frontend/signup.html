<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — AnimateAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #08080B;
      --surface:    #101014;
      --surface-2:  #17171D;
      --border:     #222228;
      --border-2:   #2E2E36;
      --text:       #EDECE5;
      --text-mid:   #A09FA8;
      --text-muted: #5C5C66;
      --accent:     #C9A84C;
      --accent-dim: #1A1608;
      --radius:     10px;
      --radius-lg:  16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image: radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    nav {
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }

    .auth-layout {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.5s ease forwards;
    }

    .auth-header {
      margin-bottom: 36px;
      text-align: center;
    }

    .auth-title {
      font-family: 'Fraunces', serif;
      font-size: 34px;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      color: var(--text);
    }
    .auth-title em {
      font-style: italic;
      color: var(--accent);
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    .auth-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-mid);
      margin-bottom: 8px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-font-smoothing: antialiased;
    }
    input::placeholder { color: var(--text-muted); }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
    }

    .password-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 24px 0;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .terms-row input[type="checkbox"] {
      width: 15px; height: 15px;
      margin-top: 2px;
      accent-color: var(--accent);
      flex-shrink: 0;
      cursor: pointer;
    }
    .terms-row a {
      color: var(--accent);
      text-decoration: none;
    }
    .terms-row a:hover { opacity: 0.8; }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #0A0800;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 13px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 24px 0;
      font-size: 12px;
      color: var(--text-muted);
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer a:hover { opacity: 0.8; }

    /* Strength bar */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .strength-segment {
      flex: 1;
      height: 3px;
      background: var(--border-2);
      border-radius: 2px;
      transition: background 0.3s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Animate<span>AI</span></a>
  </nav>

  <div class="auth-layout">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">Create your <em>account</em></h1>
        <p class="auth-subtitle">Start generating math animations for free</p>
      </div>

      <div class="auth-form">
        <form action="#" method="POST" id="signup-form">

          <div class="form-row-2">
            <div>
              <label for="first-name">First name</label>
              <input type="text" id="first-name" name="first_name" placeholder="Jane" autocomplete="given-name" required>
            </div>
            <div>
              <label for="last-name">Last name</label>
              <input type="text" id="last-name" name="last_name" placeholder="Smith" autocomplete="family-name" required>
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="new-password" required>
            <div class="strength-bar" id="strength-bar">
              <div class="strength-segment" id="seg1"></div>
              <div class="strength-segment" id="seg2"></div>
              <div class="strength-segment" id="seg3"></div>
              <div class="strength-segment" id="seg4"></div>
            </div>
            <p class="password-hint">Minimum 8 characters</p>
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm password</label>
            <input type="password" id="confirm-password" name="confirm_password" placeholder="••••••••" autocomplete="new-password" required>
          </div>

          <label class="terms-row">
            <input type="checkbox" name="terms" required>
            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
          </label>

          <button type="submit" class="btn-submit">Create Account</button>
        </form>

        <div class="auth-divider">or</div>

        <div class="auth-footer">
          Already have an account? <a href="login.html">Log in →</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Simple password strength indicator
    const pwInput = document.getElementById('password');
    const segs = [
      document.getElementById('seg1'),
      document.getElementById('seg2'),
      document.getElementById('seg3'),
      document.getElementById('seg4'),
    ];
    const colors = ['#C0392B', '#E67E22', '#F1C40F', '#2ECC71'];

    pwInput.addEventListener('input', function() {
      const len = this.value.length;
      const strength = len === 0 ? 0 : len < 6 ? 1 : len < 8 ? 2 : len < 12 ? 3 : 4;
      segs.forEach((s, i) => {
        s.style.background = i < strength ? colors[strength - 1] : 'var(--border-2)';
      });
    });

    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const pw  = document.getElementById('password').value;
      const cpw = document.getElementById('confirm-password').value;
      if (pw !== cpw) {
        alert('Passwords do not match.');
        return;
      }
      // TODO: wire to POST /api/auth/signup
      window.location.href = 'app.html';
    });
  </script>

</body>
</html>
